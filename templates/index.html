<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Axis Medical AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; text-align: center; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #218838; }
        .result { background: #e2f0d9; padding: 15px; border-radius: 5px; margin-top: 20px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحباً بك في Axis Medical AI</h1>
        <form action="/diagnose" method="POST">
            <input type="text" name="symptom" placeholder="اكتب الأعراض المرضية هنا..." required>
            <input type="text" name="country" placeholder="الدولة (مثلاً: مصر)..." required>
            <button type="submit">ابدأ التشخيص الذكي</button>
        </form>
        
        {% if result %}
            <div class="result">
                <h3>نتيجة التشخيص المبدئي:</h3>
                <p>{{ result }}</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
